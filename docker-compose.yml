version: "3.8"

services:
  backend:
    build: .
    container_name: dojrzewalnia-backend
    restart: always
    env_file:
      - .env
    volumes:
      - backend_data:/app/data
      - ./app.db:/app/app.db
    expose:
      - "5000"

  nginx:
    image: nginx:stable-alpine
    container_name: dojrzewalnia-nginx
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./releases:/usr/share/nginx/html/firmware:ro

volumes:
  backend_data: