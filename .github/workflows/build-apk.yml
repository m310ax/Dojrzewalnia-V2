name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable

      - name: Install dependencies
        working-directory: curing_app
        run: flutter pub get

      - name: Build APK
        working-directory: curing_app
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dojrzewalnia-pro-apk
          path: curing_app/build/app/outputs/flutter-apk/app-release.apk